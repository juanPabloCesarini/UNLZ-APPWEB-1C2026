<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laboratorio: Pokémon Efímero</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="fondo-app text-white">
    <main class="container min-vh-100 d-flex align-items-center justify-content-center">
      <section class="w-100 text-center contenedor-laboratorio">
        <h1 class="fw-bold text-white mb-3">Laboratorio: Pokémon Efímero</h1>

        <p class="text-white subtitulo mb-4">
          Aprendiendo Async/Await, DOM y Modularización
        </p>

        <div class="panel-buscador rounded-4 p-3 p-md-4 mx-auto">
          <div class="row g-2 align-items-center">
            <div class="col-12 col-md">
              <input
                type="text"
                id="busqueda"
                class="form-control input-pokemon"
                placeholder="Nombre del Pokémon..."
              />
            </div>

            <div class="col-12 col-md-auto">
              <button id="btnBuscar" class="btn boton-pokeball fw-bold w-100">
                Lanzar Pokeball
              </button>
            </div>
          </div>

          <p class="texto-ejemplos text-white mt-3 mb-0">
            Ejemplos: Pikachu, Charmander, Bulbasaur
          </p>

          <div id="loader" class="mt-3 d-none texto-loader">
            Buscando Pokémon...
          </div>

          <div id="tarjetaPokemon" class="tarjeta-pokemon text-center mt-4 d-none">
            <div class="circulo-imagen mx-auto mb-3">
              <img
                id="imagenPokemon"
                class="imagen-pokemon"
                src=""
                alt="Imagen del Pokémon encontrado"
              />
            </div>

            <h2 id="nombrePokemon" class="nombre-pokemon mb-0"></h2>
          </div>

          <div id="resultado" class="mt-3 texto-resultado"></div>
        </div>
      </section>
    </main>

    <script type="module" src="js/main.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
  </body>
</html>
