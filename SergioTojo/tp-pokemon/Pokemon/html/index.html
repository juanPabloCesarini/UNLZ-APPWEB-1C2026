<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio JS Avanzado - UNLZ</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

    <div class="app-container">
        <header>
            <img src="https://www.pngall.com/wp-content/uploads/13/Pokemon-Logo-PNG-Pic.png" alt="" width="140">
        </header>

        <main class="card" style="text-align:center;">
            <div class="instrucciones" style="text-align: center">
                <p><strong>ENCUENTRA A TU POKEMÓN</strong>
                    <hr>
                    Busca un Pokémon:
                </p>
            </div>
            <div class="search-box">
                <input type="text" id="busqueda" placeholder="Nombre del Pokémon..." autofocus>
                <button id="btnBuscar">Buscar</button>
                <hr>
                <button id="btnAtrapar">Lanzar Pokéball ◓</button>
            </div>
            <div id="catch" class="catch hidden">
                <h2>¡Pokemon atrapado!</h2>
                <div id="catch" class="catch hidden">
                    <h2>Elije el pokemón que quieras atrapar</h2>
                </div>
            </div>
            <div id="loader" class="loader hidden">
                <div class="spinner"></div>
                <span>Conectando con la PokéAPI...</span>
            </div>

            <div id="resultado" class="pokemon-display"></div>
        </main>

        <footer>
            <p style="text-align:center;color:white;"><strong>Trabajo práctico - Sergio Tojo</strong></p>
        </footer>
    </div>
    <script type="module" src="../js/main.js"></script>
</body>

</html>
