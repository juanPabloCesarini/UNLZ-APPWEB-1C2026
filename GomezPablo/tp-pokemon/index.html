<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeApp</title>
    <link rel="shortcut icon" href="./img/icon.ico" type="image/x-icon">:
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <main class="container">
        <div class="title-container">
            <img src="./img/pokeball.png" width="128px" alt="">
            <h1 class="title">Poke<span style="color:white">App</span></h1>
            <p class="subtitle">Escribí el nombre del pokemon y descubrí detalles...</p>
        </div>

        <div class="inputContainer">
            <input type="text" id="inputQuery" class="inputQuery" placeholder="Pikachu, Charizard, etc...">
            <button type="button" id="buttonQuery" class="btn">Buscar</button>
        </div>

        <div id="app">
        </div>
    </main>


    <script type="module" src="./js/main.js"></script>
</body>

</html>
