<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TP Pokemon</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    height: 100vh;
    margin: 0;
    background-color: #ffffff;
    padding-top: 150px; 
  }

  h1 {
    color: rgb(243, 1, 1); 
  }

  input {
    padding: 8px;
    margin: 10px;
  }

  button {
    padding: 8px 12px;
    cursor: pointer;
    background-color: blue; 
    color: white; 
    border: none;
    border-radius: 5px;
  }
</style>

</head>


<body>

  <h1>Buscador Pokemon</h1>

  <input type="text" id="busqueda" placeholder="Ej: pikachu">
  <button id="btnBuscar">Buscar</button>

  <div id="loader" style="display:none;">Cargando...</div>

  <div id="resultado"></div>

  <script type="module" src="./js/main.js"></script>

</html>
