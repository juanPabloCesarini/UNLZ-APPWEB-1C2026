<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Pokemon</title>
    <link rel="stylesheet" href="css/Styles.css">
</head>

<body>
   
    <main class="container">
        <header>
            <h1>⚡Buscador de Pokemones⚡</h1>
            <p class="subtitule">Ingrese el nombre del Pokemon que desea encontrar</p>
        </header>

        <div class="search-card">
        <div class="form-group">
            <input 
            type="text"
            id="busqueda"
            placeholder="Ej: pikachu, ditto, charizard..."
            />
            <button id="btnBuscar">Lanzar Pokeball ◓⃙</button>
        </div>
        

        <div id="loader" class="loader hidden"> ⏳ Buscando en la API...</div> 
        <div id="resultado" class="resultado-container"></div>
        </div>
    </main>


    <script type="module" src="./js/main.js"></script> 

</body>
</html>
